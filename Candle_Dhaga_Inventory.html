<style>
  * { box-sizing: border-box; }
  body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: #f5f5f5;
    color: #222;
  }
  header {
    background: #d6541f;
    color: #fff;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  header h1 { font-size: 18px; margin: 0; }
  .container { max-width: 900px; margin: 0 auto; padding: 16px; }
  .search-box {
    width: 100%;
    padding: 12px;
    font-size: 18px;
    border: 1px solid #ccc;
    border-radius: 8px;
    margin-bottom: 16px;
  }
  .toggle-btn {
    background: #fff;
    color: #d6541f;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    font-weight: bold;
    cursor: pointer;
  }
  .toggle-btn.active { background: #222; color: #fff; }
  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    border-radius: 8px;
    overflow: hidden;
  }
  th, td {
    padding: 10px 8px;
    text-align: center;
    border-bottom: 1px solid #eee;
    font-size: 15px;
  }
  th { background: #4472C4; color: #fff; position: sticky; top: 0; }
  tr:hover { background: #fafafa; }
  input.qty-input {
    width: 70px;
    padding: 6px;
    font-size: 15px;
    text-align: center;
    border: 1px solid #ccc;
    border-radius: 4px;
  }
  input.qty-input:disabled {
    border: none;
    background: transparent;
    color: #222;
    font-weight: bold;
  }
  .available { color: #1d9e75; font-weight: bold; }
  .not-available { color: #c0392b; }
  .info { font-size: 13px; color: #666; padding: 8px 0; }
  .stats { display:flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
  .stat-card { background:#fff; border-radius:8px; padding:10px 16px; font-size:14px; flex:1; min-width:120px; text-align:center; }
  .stat-card b { display:block; font-size:20px; }
  .save-msg { color: #1d9e75; font-size: 13px; margin-left: 8px; }
  .lock-row {
    margin-bottom: 12px;
  }
  .lock-row input {
    padding: 8px;
    font-size: 14px;
    border-radius: 6px;
    border: 1px solid #ccc;
    margin-right: 6px;
  }
</style>
</head>
<body>

<header>
  <h1>Candle Viscose Dhaga - Cone Inventory</h1>
  <div id="editControls">
    <button class="toggle-btn" id="editToggle" onclick="toggleEdit()">Edit Mode On / Off</button>
  </div>
</header>

<div class="container">

  <div id="lockSection" class="lock-row" style="display:none;">
    <input type="password" id="pwInput" placeholder="Edit password" />
    <button class="toggle-btn" onclick="checkPassword()">Unlock Edit</button>
    <span id="pwMsg" style="color:#c0392b; font-size:13px;"></span>
  </div>

  <input type="text" class="search-box" id="searchBox" placeholder="Dhaga number search karein... (e.g. 3001)" oninput="render()">

  <div class="stats">
    <div class="stat-card">Total Shades<b id="totalShades">0</b></div>
    <div class="stat-card">Available<b id="totalAvailable">0</b></div>
    <div class="stat-card">Total Cones<b id="totalCones">0</b></div>
  </div>

  <div class="info" id="modeInfo">View mode: numbers search karein, available cones dekhein.</div>

  <table>
    <thead>
      <tr>
        <th>Sr#</th>
        <th>Shade Number</th>
        <th>Cones Available</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

</div>

const STORAGE_KEY = "candle_dhaga_inventory_v1";
const EDIT_PASSWORD = "candle123"; // ye password change kar lein

let inventory = {};
let editMode = false;
let unlocked = false;

function loadInventory() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    inventory = JSON.parse(saved);
  } else {
    inventory = {};
    SHADES.forEach(s => inventory[s] = 0);
  }
  // ensure all shades exist
  SHADES.forEach(s => { if (!(s in inventory)) inventory[s] = 0; });
}

function saveInventory() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(inventory));
}

function toggleEdit() {
  if (!editMode) {
    document.getElementById('lockSection').style.display = 'flex';
  } else {
    editMode = false;
    document.getElementById('editToggle').classList.remove('active');
    document.getElementById('lockSection').style.display = 'none';
    render();
  }
}

function checkPassword() {
  const pw = document.getElementById('pwInput').value;
  if (pw === EDIT_PASSWORD) {
    editMode = true;
    unlocked = true;
    document.getElementById('editToggle').classList.add('active');
    document.getElementById('lockSection').style.display = 'none';
    document.getElementById('pwMsg').textContent = '';
    render();
  } else {
    document.getElementById('pwMsg').textContent = 'Galat password';
  }
}

function updateQty(shade, value) {
  let v = parseInt(value);
  if (isNaN(v) || v < 0) v = 0;
  inventory[shade] = v;
  saveInventory();
  updateStats();
  // update status cell
  const statusCell = document.getElementById('status-' + shade);
  if (statusCell) {
    if (v > 0) {
      statusCell.textContent = 'Available';
      statusCell.className = 'available';
    } else {
      statusCell.textContent = 'Not Available';
      statusCell.className = 'not-available';
    }
  }
}

function updateStats() {
  let total = SHADES.length;
  let available = 0;
  let totalCones = 0;
  SHADES.forEach(s => {
    const q = inventory[s] || 0;
    if (q > 0) available++;
    totalCones += q;
  });
  document.getElementById('totalShades').textContent = total;
  document.getElementById('totalAvailable').textContent = available;
  document.getElementById('totalCones').textContent = totalCones;
}

function render() {
  const query = document.getElementById('searchBox').value.trim();
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';

  let filtered = SHADES;
  if (query) {
    filtered = SHADES.filter(s => String(s).includes(query));
  }

  document.getElementById('modeInfo').textContent = editMode
    ? 'Edit mode ON: cones ki quantity update karein, save apne aap ho jayega.'
    : 'View mode: numbers search karein, available cones dekhein.';

  filtered.forEach((shade, idx) => {
    const qty = inventory[shade] || 0;
    const tr = document.createElement('tr');

    const tdSr = document.createElement('td');
    tdSr.textContent = idx + 1;

    const tdShade = document.createElement('td');
    tdShade.textContent = shade;
    tdShade.style.fontWeight = 'bold';

    const tdQty = document.createElement('td');
    const input = document.createElement('input');
    input.type = 'number';
    input.className = 'qty-input';
    input.min = '0';
    input.value = qty;
    input.disabled = !editMode;
    input.addEventListener('change', (e) => updateQty(shade, e.target.value));
    tdQty.appendChild(input);

    const tdStatus = document.createElement('td');
    tdStatus.id = 'status-' + shade;
    if (qty > 0) {
      tdStatus.textContent = 'Available';
      tdStatus.className = 'available';
    } else {
      tdStatus.textContent = 'Not Available';
      tdStatus.className = 'not-available';
    }

    tr.appendChild(tdSr);
    tr.appendChild(tdShade);
    tr.appendChild(tdQty);
    tr.appendChild(tdStatus);
    tbody.appendChild(tr);
  });

  updateStats();
}

loadInventory();
render();
